# Change these first
owner: touzesabine # Your GitHub organization or username, where this repository lives
repo: upptime # The name of this repository

sites:
  - name: City of Santa Clara
    url: https://www.santaclaraca.gov
    maxResponseTime: 10000
  - name: admin
    url: $SITE1
    maxResponseTime: 10000
  - name: Silicon Valley Animal Control Authority
    url: https://www.svaca.com
    maxResponseTime: 10000
  - name: Silicon Valley Power
    url: https://www.siliconvalleypower.com
    maxResponseTime: 10000
  - name: Fiber Connect
    url: https://www.svpfiber.com
    maxResponseTime: 10000
  - name: Santa Clara City Library
    url: https://www.sclibrary.org
    maxResponseTime: 10000

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  baseUrl: /upptime
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Upptime
  introTitle: "Upptime with Github test"
  introMessage:  Are these websites working right now?
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

