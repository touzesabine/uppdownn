name: Test CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [summary]
  workflow_dispatch:
jobs:
  release:
    name: Generate TEST
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2.3.3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT }}
      - name: Update summary in TEST
        uses: upptime/uptime-monitor@v1.28.0
        with:
          command: "test"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
